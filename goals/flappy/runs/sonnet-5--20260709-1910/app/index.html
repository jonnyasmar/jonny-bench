<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Driftglow</title>
<meta name="description" content="Driftglow — guide a wisp of starlight through drifting crystal spires.">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud">
    <div id="score">0</div>
  </div>

  <button id="muteBtn" aria-label="Toggle sound">🔊</button>

  <div id="startScreen" class="panel">
    <div class="panel-inner">
      <h1>Driftglow</h1>
      <p class="tagline">Guide the wisp through the drifting spires.</p>
      <div class="glyph" id="startGlyph">✦</div>
      <p class="hint"><span class="key">Space</span> or <span class="key">Tap</span> to flit</p>
      <button id="startBtn" class="primary-btn">Begin Drift</button>
      <p class="best-line">Best: <span id="startBest">0</span></p>
    </div>
  </div>

  <div id="gameOverScreen" class="panel hidden">
    <div class="panel-inner">
      <h1 class="fade-title">Faded Out</h1>
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Distance</span>
          <span class="stat-value" id="finalScore">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Best</span>
          <span class="stat-value" id="finalBest">0</span>
        </div>
      </div>
      <div id="newBestBadge" class="new-best hidden">✦ New Best ✦</div>
      <button id="restartBtn" class="primary-btn">Drift Again</button>
    </div>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
