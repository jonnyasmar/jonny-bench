<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The 2026 World Cup, in 60 seconds</title>
<meta name="description" content="A 60-second visual story of the 2026 FIFA World Cup so far — groups, the knockout bracket, records and the Golden Boot race, through the semifinals (updated July 16, 2026).">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
  :root { color-scheme: light dark; }

  .viz-root {
    color-scheme: light;
    --surface-1:   #fcfcfb;
    --page:        #f9f9f7;
    --ink:         #0b0b0b;
    --ink-2:       #52514e;
    --muted:       #898781;
    --grid:        #e1e0d9;
    --baseline:    #c3c2b7;
    --border:      rgba(11,11,11,0.10);
    --accent:      #2a78d6;   /* categorical slot 1 */
    --accent-soft: rgba(42,120,214,0.10);
    --deemph:      #c3c2b7;   /* de-emphasis bar gray */
    --upset:       #eb6834;   /* categorical slot 6, flags upsets */
    --tip-bg:      #fcfcfb;
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) .viz-root {
      color-scheme: dark;
      --surface-1:   #1a1a19;
      --page:        #0d0d0d;
      --ink:         #ffffff;
      --ink-2:       #c3c2b7;
      --muted:       #898781;
      --grid:        #2c2c2a;
      --baseline:    #383835;
      --border:      rgba(255,255,255,0.10);
      --accent:      #3987e5;
      --accent-soft: rgba(57,135,229,0.14);
      --deemph:      #4a4a47;
      --upset:       #d95926;
      --tip-bg:      #242423;
    }
  }
  :root[data-theme="dark"] .viz-root {
    color-scheme: dark;
    --surface-1:   #1a1a19;
    --page:        #0d0d0d;
    --ink:         #ffffff;
    --ink-2:       #c3c2b7;
    --muted:       #898781;
    --grid:        #2c2c2a;
    --baseline:    #383835;
    --border:      rgba(255,255,255,0.10);
    --accent:      #3987e5;
    --accent-soft: rgba(57,135,229,0.14);
    --deemph:      #4a4a47;
    --upset:       #d95926;
    --tip-bg:      #242423;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page);
  }
  .viz-root {
    color: var(--ink);
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
    background: var(--page);
    padding: 12px clamp(10px, 2.5vw, 28px) 14px;
    gap: 10px;
  }

  /* ---------- header ---------- */
  .top {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap; row-gap: 6px;
    font-size: 13px; color: var(--ink-2);
  }
  .top .brand { font-weight: 650; color: var(--ink); letter-spacing: .01em; }
  .top .asof { color: var(--muted); }
  .top .spacer { flex: 1; }
  button.chip {
    font: inherit; font-size: 12.5px; color: var(--ink-2);
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 999px; padding: 5px 12px; cursor: pointer;
  }
  button.chip:hover { color: var(--ink); border-color: var(--baseline); }
  button:focus-visible, [tabindex]:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ---------- stage ---------- */
  .stage {
    position: relative; flex: 1; min-height: 540px;
    background: var(--surface-1);
    border: 1px solid var(--border); border-radius: 16px;
    overflow: hidden;
  }
  .stage::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(90% 55% at 50% -10%, var(--accent-soft), transparent 70%);
  }
  .scene {
    position: absolute; inset: 0;
    padding: clamp(16px, 3.5vh, 34px) clamp(16px, 3vw, 40px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 8px;
    visibility: hidden; opacity: 0;
    transition: opacity .5s ease, visibility 0s linear .5s;
  }
  .scene.active { visibility: visible; opacity: 1; transition: opacity .5s ease; }
  @media (max-width: 760px), (max-height: 620px) {
    .scene { justify-content: flex-start; overflow-y: auto; }
  }

  /* reveal primitive */
  .rev { opacity: 0; transform: translateY(14px); transition: opacity .55s ease, transform .55s ease; }
  .rev.on { opacity: 1; transform: none; }

  .eyebrow {
    font-size: 12px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--muted); font-weight: 600;
  }
  h1 { font-size: clamp(26px, 4.6vw, 46px); line-height: 1.08; margin: 4px 0 0; font-weight: 750; letter-spacing: -.015em; }
  h1 .lite { color: var(--ink-2); font-weight: 500; }
  h2 { font-size: clamp(19px, 2.6vw, 27px); margin: 2px 0 0; font-weight: 700; letter-spacing: -.01em; }
  .caption { font-size: clamp(13px, 1.5vw, 15.5px); color: var(--ink-2); max-width: 760px; line-height: 1.45; }
  .footnote { font-size: 11.5px; color: var(--muted); }

  /* ---------- scene 0: kickoff ---------- */
  .hero { margin: 6px 0 2px; }
  .hero-num {
    display: block; font-size: clamp(64px, 13vh, 118px); font-weight: 760;
    letter-spacing: -.03em; line-height: 1; color: var(--ink);
    font-variant-numeric: normal;
  }
  .hero-lab { display: block; margin-top: 6px; font-size: clamp(14px, 1.8vw, 17px); color: var(--ink-2); }
  .tiles { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 18px; }
  .tile {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 18px; min-width: 150px; text-align: left;
  }
  .tile .t-lab { font-size: 11.5px; color: var(--muted); letter-spacing: .04em; }
  .tile .t-val { font-size: 26px; font-weight: 700; letter-spacing: -.01em; margin-top: 2px; }
  .tile .t-sub { font-size: 11.5px; color: var(--ink-2); margin-top: 3px; }

  /* ---------- scene 1: groups ---------- */
  .groups {
    display: grid; grid-template-columns: repeat(6, minmax(130px, 168px));
    gap: 10px; margin-top: 14px; justify-content: center; width: 100%;
  }
  @media (max-width: 1080px) { .groups { grid-template-columns: repeat(4, minmax(130px, 172px)); } }
  @media (max-width: 720px)  { .groups { grid-template-columns: repeat(3, minmax(104px, 1fr)); gap: 7px; } }
  .gcard {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 10px 9px; text-align: left; cursor: default;
  }
  .ghead { font-size: 10.5px; letter-spacing: .14em; color: var(--muted); font-weight: 650; margin-bottom: 5px; }
  .grow { display: flex; align-items: center; gap: 6px; font-size: 12.5px; padding: 2px 0; color: var(--ink-2); }
  .grow.w { color: var(--ink); font-weight: 650; }
  .grow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex: none; }
  .grow .g3 {
    flex: none; font-size: 9px; font-weight: 700; letter-spacing: .05em; color: var(--ink-2);
    border: 1px solid var(--baseline); border-radius: 4px; padding: 0 3px;
  }
  .grow .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .grow .pt { margin-left: auto; color: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; }
  .grow .flg { flex: none; }

  /* ---------- scene 2: bracket ---------- */
  .bracket-wrap { width: 100%; margin-top: 10px; overflow-x: auto; overflow-y: hidden; }
  .bsizer { margin: 0 auto; overflow: hidden; }
  .bracket {
    display: grid; grid-template-columns: repeat(4, 132px) 190px repeat(4, 132px);
    gap: 10px; width: 1326px; height: 560px;
    transform-origin: top left; text-align: left;
  }
  .bcol { display: flex; flex-direction: column; min-width: 0; }
  .bhead { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); font-weight: 650; text-align: center; padding-bottom: 6px; white-space: nowrap; }
  .bcells { flex: 1; display: flex; flex-direction: column; justify-content: space-around; gap: 6px; }
  .match {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px;
    padding: 5px 8px; cursor: default; position: relative;
  }
  .match.upset { border-left: 3px solid var(--upset); }
  .match:hover, .match:focus-visible { border-color: var(--baseline); }
  .mrow { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); line-height: 1.45; }
  .mrow.win { color: var(--ink); font-weight: 650; }
  .mrow .cd { letter-spacing: .02em; }
  .mrow .sc { margin-left: auto; font-variant-numeric: tabular-nums; }
  .mx { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .fcard {
    background: var(--surface-1); border: 1.5px solid var(--accent); border-radius: 12px;
    padding: 12px 12px 10px; text-align: center;
  }
  .fcard .fx { font-size: 10px; letter-spacing: .14em; color: var(--accent); font-weight: 700; margin-bottom: 8px; }
  .fcard .frow { display: flex; align-items: center; justify-content: center; gap: 7px; font-size: 15px; font-weight: 700; padding: 3px 0; }
  .fcard .fv { font-size: 11px; color: var(--muted); margin: 2px 0; }
  .fcard .fw { font-size: 11px; color: var(--ink-2); margin-top: 7px; }
  .bronze { margin-top: 12px; font-size: 11px; color: var(--muted); text-align: center; line-height: 1.5; }
  .bkey { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .bkey .uk { display: inline-block; width: 8px; height: 8px; background: var(--upset); border-radius: 2px; vertical-align: baseline; margin-right: 3px; }

  /* ---------- bars (records + golden boot) ---------- */
  .charts3 { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-top: 14px; width: 100%; }
  .rchart {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; width: min(330px, 100%); text-align: left;
  }
  .rchart h3 { margin: 0 0 10px; font-size: 13px; font-weight: 650; color: var(--ink); line-height: 1.3; }
  .rchart h3 small { display: block; font-weight: 500; color: var(--muted); font-size: 11px; margin-top: 2px; }
  .brow { display: grid; grid-template-columns: 96px 1fr; align-items: center; gap: 8px; padding: 4px 0; }
  .brow .blab { font-size: 12px; color: var(--ink-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; gap: 5px; align-items: center; }
  .brow.em .blab { color: var(--ink); font-weight: 650; }
  .track { display: flex; align-items: center; gap: 7px; min-width: 0; }
  .subtrack { flex: 1; min-width: 0; }
  .bar {
    display: block; height: 14px; width: 0; border-radius: 0 4px 4px 0; background: var(--deemph);
    transition: width .9s cubic-bezier(.22,.61,.36,1);
  }
  .bval { flex: none; }
  .brow.em .bar { background: var(--accent); }
  .brow.on .bar { width: var(--w); }
  .bval { font-size: 12px; color: var(--ink-2); font-weight: 600; opacity: 0; transition: opacity .5s ease .35s; white-space: nowrap; }
  .brow.on .bval { opacity: 1; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 16px; max-width: min(880px, 100%); }
  .chip-f {
    font-size: 12px; color: var(--ink-2); background: var(--surface-1);
    border: 1px solid var(--border); border-radius: 999px; padding: 6px 13px;
  }
  .chip-f b { color: var(--ink); font-weight: 650; }

  /* golden boot */
  .boot { width: min(660px, 94%); margin-top: 12px; text-align: left; }
  .boot .brow { grid-template-columns: 150px 1fr; }
  @media (max-width: 560px) { .boot .brow { grid-template-columns: 108px 1fr; } }
  .legend { display: flex; gap: 18px; justify-content: center; margin-top: 12px; font-size: 12px; color: var(--ink-2); }
  .legend .sw { display: inline-block; width: 14px; height: 10px; border-radius: 3px; margin-right: 6px; vertical-align: baseline; }

  /* ---------- scene 5: final ---------- */
  .versus {
    display: flex; align-items: center; gap: clamp(14px, 4vw, 44px); margin: 10px 0 4px;
  }
  .vteam { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .vteam .vf { font-size: clamp(44px, 9vh, 76px); line-height: 1; }
  .vteam .vn { font-size: clamp(17px, 2.4vw, 25px); font-weight: 750; letter-spacing: -.01em; }
  .vteam .vs { font-size: 11.5px; color: var(--muted); max-width: 190px; }
  .vmid { font-size: clamp(14px, 2vw, 19px); color: var(--muted); font-weight: 500; }

  /* ---------- transport ---------- */
  .transport { display: flex; align-items: center; gap: 12px; }
  .pbtn {
    font: inherit; width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface-1); color: var(--ink); cursor: pointer; font-size: 15px; flex: none;
  }
  .pbtn:hover { border-color: var(--baseline); }
  .scrub { flex: 1; display: flex; gap: 3px; cursor: pointer; touch-action: none; padding: 6px 0; }
  .seg { position: relative; height: 26px; border-radius: 6px; background: var(--surface-1); border: 1px solid var(--border); overflow: hidden; }
  .seg .segfill { position: absolute; inset: 0; width: 0%; background: var(--accent-soft); border-right: 2px solid var(--accent); }
  .seg .seglab {
    position: absolute; inset: 0; display: flex; align-items: center; padding-left: 8px;
    font-size: 10.5px; color: var(--ink-2); letter-spacing: .03em; white-space: nowrap; pointer-events: none;
  }
  @media (max-width: 760px) { .seg .seglab { display: none; } }
  .clock { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; flex: none; }
  .hint { text-align: center; font-size: 11px; color: var(--muted); }

  /* ---------- tooltip ---------- */
  #tip {
    position: fixed; z-index: 40; max-width: 320px; pointer-events: none;
    background: var(--tip-bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 9px 12px; font-size: 12px; line-height: 1.5; color: var(--ink-2);
    box-shadow: 0 6px 24px rgba(0,0,0,.14); display: none; text-align: left;
  }
  #tip .t1 { color: var(--muted); font-size: 10.5px; letter-spacing: .05em; text-transform: uppercase; }
  #tip .t2 { color: var(--ink); font-weight: 650; font-size: 13px; margin: 2px 0; }
  #tip .t3 { color: var(--ink-2); }
  #tip .t4 { color: var(--ink-2); font-style: italic; margin-top: 3px; }

  /* ---------- data panel ---------- */
  #panel {
    position: absolute; inset: 0; z-index: 30; background: var(--surface-1);
    border-radius: 16px; padding: clamp(16px, 3vw, 32px); overflow: auto; display: none; text-align: left;
  }
  #panel.open { display: block; }
  #panel h2 { font-size: 20px; margin: 0 0 4px; }
  #panel h3 { font-size: 14px; margin: 22px 0 8px; }
  #panel table { border-collapse: collapse; width: 100%; max-width: 880px; font-size: 12.5px; }
  #panel th { text-align: left; color: var(--muted); font-weight: 600; font-size: 11px; letter-spacing: .05em; text-transform: uppercase; padding: 5px 10px 5px 0; border-bottom: 1px solid var(--grid); }
  #panel td { padding: 5px 10px 5px 0; border-bottom: 1px solid var(--grid); color: var(--ink-2); vertical-align: top; }
  #panel td.strong { color: var(--ink); font-weight: 600; }
  #panel td.num { font-variant-numeric: tabular-nums; }
  #panel .close { position: sticky; top: 0; float: right; }
  #panel ul { margin: 6px 0; padding-left: 18px; color: var(--ink-2); font-size: 12.5px; line-height: 1.6; }
  #panel .footnote { margin-top: 18px; max-width: 760px; line-height: 1.5; }

  @media (prefers-reduced-motion: reduce) {
    .rev, .scene, .bar, .bval, .seg .segfill { transition-duration: .01s !important; }
  }
</style>
</head>
<body>
<div class="viz-root" id="app">
  <header class="top">
    <span class="brand">⚽ The 2026 World Cup, in 60 seconds</span>
    <span class="asof">through the semifinals · Jul 16, 2026</span>
    <span class="spacer"></span>
    <button class="chip" id="dataBtn" aria-pressed="false">▤ Data & sources</button>
    <button class="chip" id="themeBtn" aria-label="Toggle color theme">◐ Theme</button>
  </header>

  <main class="stage" id="stage" aria-label="Animated 60-second summary of the 2026 World Cup">
    <noscript><p style="padding:40px;text-align:center">This visualization needs JavaScript. All underlying data is described in the page source.</p></noscript>
    <aside id="panel" aria-label="Data tables and sources"></aside>
  </main>

  <footer class="transport">
    <button class="pbtn" id="playBtn" aria-label="Pause">❚❚</button>
    <div class="scrub" id="scrub" aria-label="Timeline scrubber"></div>
    <span class="clock" id="clock">0:00 / 1:00</span>
  </footer>
  <div class="hint">space — play/pause · ← → — scenes · hover or focus any mark for detail · ▤ for every table</div>

  <div id="tip" aria-hidden="true"></div>
</div>

<script>
"use strict";
/* =============================================================
   DATA — compiled July 16, 2026 (through the July 14–15 semifinals)
   Sources: Wikipedia, FIFA.com, ESPN, Goal.com, FOX/NBC — see panel.
   ============================================================= */
const TEAMS = {
  GER:["Germany","🇩🇪"], PAR:["Paraguay","🇵🇾"], FRA:["France","🇫🇷"], SWE:["Sweden","🇸🇪"],
  RSA:["South Africa","🇿🇦"], CAN:["Canada","🇨🇦"], NED:["Netherlands","🇳🇱"], MAR:["Morocco","🇲🇦"],
  POR:["Portugal","🇵🇹"], CRO:["Croatia","🇭🇷"], ESP:["Spain","🇪🇸"], AUT:["Austria","🇦🇹"],
  USA:["United States","🇺🇸"], BIH:["Bosnia & Herzegovina","🇧🇦","Bosnia-Herz."], BEL:["Belgium","🇧🇪"], SEN:["Senegal","🇸🇳"],
  BRA:["Brazil","🇧🇷"], JPN:["Japan","🇯🇵"], CIV:["Ivory Coast","🇨🇮"], NOR:["Norway","🇳🇴"],
  MEX:["Mexico","🇲🇽"], ECU:["Ecuador","🇪🇨"], ENG:["England","🏴󠁧󠁢󠁥󠁮󠁧󠁿"], COD:["DR Congo","🇨🇩"],
  ARG:["Argentina","🇦🇷"], CPV:["Cape Verde","🇨🇻"], AUS:["Australia","🇦🇺"], EGY:["Egypt","🇪🇬"],
  SUI:["Switzerland","🇨🇭"], ALG:["Algeria","🇩🇿"], COL:["Colombia","🇨🇴"], GHA:["Ghana","🇬🇭"],
  KOR:["South Korea","🇰🇷"], CZE:["Czechia","🇨🇿"], QAT:["Qatar","🇶🇦"], SCO:["Scotland","🏴󠁧󠁢󠁳󠁣󠁴󠁿"],
  HAI:["Haiti","🇭🇹"], TUR:["Türkiye","🇹🇷"], CUW:["Curaçao","🇨🇼"], TUN:["Tunisia","🇹🇳"],
  IRN:["Iran","🇮🇷"], NZL:["New Zealand","🇳🇿"], URU:["Uruguay","🇺🇾"], KSA:["Saudi Arabia","🇸🇦"],
  IRQ:["Iraq","🇮🇶"], JOR:["Jordan","🇯🇴"], UZB:["Uzbekistan","🇺🇿"], PAN:["Panama","🇵🇦"]
};
const nm = c => TEAMS[c][0], fl = c => TEAMS[c][1], sh = c => TEAMS[c][2] || TEAMS[c][0];

const ROUNDS = { R32:"Round of 32", R16:"Round of 16", QF:"Quarterfinal", SF:"Semifinal" };

/* Knockout matches in bracket order. win: 'a'|'b'. */
const KO = {
  r32L: [
    {a:"GER",b:"PAR",sa:1,sb:1,pens:"3–4",win:"b",upset:true,date:"Jun 29",venue:"Gillette Stadium, Foxborough",gl:"Enciso (PAR); Havertz (GER)",note:"Germany's first-ever World Cup shootout defeat. Paraguay declared a national holiday."},
    {a:"FRA",b:"SWE",sa:3,sb:0,win:"a",date:"Jun 30",venue:"MetLife Stadium, East Rutherford",gl:"Mbappé 45′ 74′, Barcola 53′"},
    {a:"RSA",b:"CAN",sa:0,sb:1,win:"b",date:"Jun 28",venue:"SoFi Stadium, Inglewood",gl:"Eustáquio 90+2′",note:"Canada's first World Cup knockout win — in the tournament's first knockout match."},
    {a:"NED",b:"MAR",sa:1,sb:1,pens:"2–3",win:"b",upset:true,date:"Jun 29",venue:"Estadio BBVA, Monterrey",note:"Group F winners Netherlands out on penalties."},
    {a:"POR",b:"CRO",sa:2,sb:1,win:"a",date:"Jul 2",venue:"BMO Field, Toronto",note:"2018 finalists Croatia eliminated."},
    {a:"ESP",b:"AUT",sa:3,sb:0,win:"a",date:"Jul 2",venue:"SoFi Stadium, Inglewood"},
    {a:"USA",b:"BIH",sa:2,sb:0,win:"a",date:"Jul 1",venue:"Levi's Stadium, Santa Clara"},
    {a:"BEL",b:"SEN",sa:3,sb:2,aet:true,win:"a",date:"Jul 1",venue:"Lumen Field, Seattle",gl:"Diarra 25′, Sarr 51′; Lukaku 86′, Tielemans 89′, 120+5′ pen",note:"The 120+5′ penalty is the latest goal in World Cup history."}
  ],
  r32R: [
    {a:"BRA",b:"JPN",sa:2,sb:1,win:"a",date:"Jun 29",venue:"NRG Stadium, Houston",gl:"Sano 29′; Casemiro 56′, Martinelli 90+5′"},
    {a:"CIV",b:"NOR",sa:1,sb:2,win:"b",date:"Jun 30",venue:"AT&T Stadium, Arlington",gl:"Diallo 74′; Nusa 39′, Haaland 86′"},

const $ = s => document.querySelector(s);
function el(tag, cls, txt){ const n = document.createElement(tag); if (cls) n.className = cls; if (txt != null) n.textContent = txt; return n; }
function rev(node, at){ node.classList.add("rev"); node.dataset.at = at; return node; }
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const easeOut = x => 1 - Math.pow(1 - x, 3);

/* tooltip */
const tip = $("#tip");
let tipFor = null;
function showTip(target, lines){
  tip.replaceChildren(...lines.filter(Boolean).map(([cls, txt]) => el("div", cls, txt)));
  tip.style.display = "block"; tipFor = target;
  placeTip(target.getBoundingClientRect());
}
function placeTip(r){
  const tw = tip.offsetWidth, th = tip.offsetHeight, vw = innerWidth, vh = innerHeight;
  let x = r.left + r.width / 2 - tw / 2, y = r.top - th - 10;
  x = clamp(x, 8, vw - tw - 8);
  if (y < 8) y = clamp(r.bottom + 10, 8, vh - th - 8);
  tip.style.left = x + "px"; tip.style.top = y + "px";
}
function hideTip(t){ if (!t || tipFor === t) { tip.style.display = "none"; tipFor = null; } }
function attachTip(node, linesFn){
  node.addEventListener("pointerenter", () => showTip(node, linesFn()));
  node.addEventListener("pointerleave", () => hideTip(node));
  node.addEventListener("focus", () => showTip(node, linesFn()));
  node.addEventListener("blur", () => hideTip(node));
  node.tabIndex = 0;
}

  s.append(

    rev(el("h2", null, "One match left."), 54.4)
  );
  const v = el("div", "versus");
  const mk = (code, sub) => {
    const t = el("div", "vteam");
    t.append(el("span", "vf", fl(code)), el("span", "vn", nm(code)), el("span", "vs", sub));
    return t;
  };
  v.append(
    mk("ESP", "European champions · unbeaten · 2 goals conceded"),
    el("span", "vmid", "v"),
    mk("ARG", "World champions · chasing the first repeat since Brazil 1962")
  );
  s.append(rev(v, 55.0));
  s.append(rev(el("p", "caption", "Messi, 38 — eight goals, three assists, twenty-one career World Cup goals — plays for one last star."), 56.4));
  s.append(rev(el("p", "footnote", "Third place · Jul 18, Miami — France v England"), 57.4));
  s.append(rev(el("p", "footnote", "That's 60 seconds. ↻ replays · ▤ has every table."), 58.4));
})();

/* =============================================================
   ENGINE
   ============================================================= */
const revEls = [...stage.querySelectorAll("[data-at]")].map(n => ({ el: n, at: +n.dataset.at }));
const countEls = [...stage.querySelectorAll("[data-count]")].map(n => ({
  el: n, target: +n.dataset.count, t0: +n.dataset.t0, t1: +n.dataset.t1, last: null
}));

const playBtn = $("#playBtn"), clockEl = $("#clock"), scrubEl = $("#scrub");
const REDUCED = matchMedia("(prefers-reduced-motion: reduce)").matches;
let t = 0, playing = !REDUCED, lastTs = null;

/* deep link: #t=32 seeks; #t=32&pause holds the frame (also used for testing) */
(function(){
  const h = new URLSearchParams(location.hash.slice(1));
  if (h.has("t")) { t = clamp(+h.get("t") || 0, 0, DUR); }
  if (h.has("pause")) playing = false;
  if (h.has("light")) document.documentElement.dataset.theme = "light";
  if (h.has("dark")) document.documentElement.dataset.theme = "dark";
})();

/* scrubber segments */
const segFills = SCENES.map(sc => {
  const seg = el("div", "seg");
  seg.style.flexGrow = String(sc.t1 - sc.t0);
  seg.style.flexBasis = "0";
  const fill = el("div", "segfill"); seg.append(fill);
  seg.append(el("div", "seglab", sc.label));
  scrubEl.append(seg);
  return fill;
});
let dragging = false;
function scrubTo(e){
  const r = scrubEl.getBoundingClientRect();
  t = clamp((e.clientX - r.left) / r.width, 0, 1) * DUR;
}
scrubEl.addEventListener("pointerdown", e => { dragging = true; scrubEl.setPointerCapture(e.pointerId); scrubTo(e); });
scrubEl.addEventListener("pointermove", e => { if (dragging) scrubTo(e); });
scrubEl.addEventListener("pointerup", () => dragging = false);

function setPlaying(p){
  playing = p;
  playBtn.textContent = playing ? "❚❚" : (t >= DUR ? "↻" : "▶");
  playBtn.setAttribute("aria-label", playing ? "Pause" : (t >= DUR ? "Replay" : "Play"));
}
playBtn.addEventListener("click", () => {
  if (!playing && t >= DUR) t = 0;
  setPlaying(!playing);
});

function sceneIndex(){
  for (let i = 0; i < SCENES.length; i++) if (t < SCENES[i].t1) return i;
  return SCENES.length - 1;
}
function jumpScene(di){
  const i = clamp(sceneIndex() + di, 0, SCENES.length - 1);
  t = SCENES[i].t0 + .01;
}

document.addEventListener("keydown", e => {
  if (e.target.closest("input,textarea")) return;
  if (e.code === "Space") { e.preventDefault(); playBtn.click(); }
  else if (e.key === "ArrowRight") jumpScene(1);
  else if (e.key === "ArrowLeft") jumpScene(-1);
  else if (e.key === "Home") { t = 0; }
  else if (e.key.toLowerCase() === "d") toggler();
  else if (e.key.toLowerCase() === "t") themeBtnFn();
  else if (e.key === "Escape" && panel.classList.contains("open")) toggler();
});

function fmt(x){ const s = Math.floor(x); return "0:" + String(s).padStart(2, "0"); }

function render(){
  const act = sceneIndex();
  sceneEls.forEach((sEl, i) => sEl.classList.toggle("active", i === act));
  for (const r of revEls) r.el.classList.toggle("on", t >= r.at);
  for (const c of countEls) {
    const p = clamp((t - c.t0) / (c.t1 - c.t0), 0, 1);
    const v = Math.round(c.target * easeOut(p));
    if (v !== c.last) { c.el.textContent = v.toLocaleString("en-US"); c.last = v; }
  }
  SCENES.forEach((sc, i) => {
    segFills[i].style.width = (clamp((t - sc.t0) / (sc.t1 - sc.t0), 0, 1) * 100).toFixed(1) + "%";
  });
  clockEl.textContent = fmt(Math.min(t, DUR)) + " / 1:00";
}

function loop(ts){
  if (lastTs == null) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, .1);
  lastTs = ts;
  if (playing && !dragging) {
    t += dt;
    if (t >= DUR) { t = DUR; setPlaying(false); }
  }
  render();
  requestAnimationFrame(loop);
}
setPlaying(playing);
requestAnimationFrame(loop);

/* =============================================================
   THEME + DATA PANEL
   ============================================================= */
function themeBtnFn(){
  const root = document.documentElement;
  const dark = matchMedia("(prefers-color-scheme: dark)").matches;
  const cur = root.dataset.theme || (dark ? "dark" : "light");
  root.dataset.theme = cur === "dark" ? "light" : "dark";
}
$("#themeBtn").addEventListener("click", themeBtnFn);

const panel = $("#panel"), dataBtn = $("#dataBtn");
function toggler(){
  const open = !panel.classList.contains("open");
  panel.classList.toggle("open", open);
  dataBtn.setAttribute("aria-pressed", String(open));
  if (open) setPlaying(false);
}
dataBtn.addEventListener("click", toggler);

(function buildPanel(){
  const close = el("button", "chip close", "✕ close"); close.addEventListener("click", toggler);
  panel.append(close, el("h2", null, "The data"),
    el("p", "footnote", "2026 FIFA World Cup through the semifinals — compiled July 16, 2026."));

  function table(headers, rows, strongCol){
    const tb = el("table"), tr = el("tr");
    headers.forEach(h => tr.append(el("th", null, h)));
    const thead = el("thead"); thead.append(tr); tb.append(thead);
    const body = el("tbody");
    rows.forEach(r => {
      const tr2 = el("tr");
      r.forEach((cell, i) => tr2.append(el("td", (i === strongCol ? "strong" : "") + (typeof cell === "number" ? " num" : ""), String(cell))));
      body.append(tr2);
    });
    tb.append(body);
    return tb;
  }

  panel.append(el("h3", null, "Knockout stage — every result"));
  panel.append(table(
    ["Round", "Match", "Score", "When · where", "Notes"],
    ALL_KO.map(m => [
      ROUNDS[m.r],
      nm(m.a) + " v " + nm(m.b),
      m.sa + "–" + m.sb + (m.aet ? " aet" : "") + (m.pens ? " · " + nm(m[m.win]) + " won " + m.pens.split("–").sort((x,y)=>y-x).join("–") + " on pens" : ""),
      m.date + " · " + m.venue,
      m.note || (m.gl ? "Goals: " + m.gl : "")
    ]).concat([
      ["Third place", "France v England", "—", "Jul 18 · Hard Rock Stadium, Miami Gardens", ""],
      ["Final", "Spain v Argentina", "—", "Jul 19 · MetLife Stadium, East Rutherford NJ", "European champions v world champions"]
    ]), 1));

  panel.append(el("h3", null, "Group stage — final standings (points)"));
  panel.append(table(
    ["Group", "1st", "2nd", "3rd", "4th"],
    GROUPS.map(([g, rows]) => [
      g,
      ...rows.map(([c, p, f]) => nm(c) + " · " + p + (f === "3" ? " (adv.)" : (f === "" && rows.findIndex(x=>x[0]===c) === 2 ? " (out)" : "")))
    ]), 1));
  panel.append(el("p", "footnote", "Top two in each group advanced, plus the eight best third-placed teams (marked adv.). Minor point discrepancies exist between published tables for Groups H and K; ordering is agreed everywhere."));

  panel.append(el("h3", null, "Golden Boot standings"));
  panel.append(table(
    ["#", "Player", "Team", "Goals", "Status"],
    SCORERS.map((p, i) => [i + 1, p.full, nm(p.t), p.g, p.s])
      .concat(SCORERS_MORE.map((p, i) => [9 + i, p.full, nm(p.t), p.g, ""])), 1));

  panel.append(el("h3", null, "Records set (selection)"));
  const ul = el("ul");
  [
    "Highest-scoring World Cup ever: 297 goals through 102 matches (2.91 per match).",
    "All-time attendance record: 6,665,825 (avg 65,351) — old record 3,587,538 at USA 1994.",
    "Messi: most career World Cup goals (21, passing Klose's 16), most World Cup appearances (38), scored in 9 straight matches, oldest hat-trick scorer (38y 357d).",
    "Unai Simón: longest World Cup clean-sheet streak — 650 minutes (old record: Zenga, 517, in 1990).",
    "Latest goal in World Cup history: 120+5′, Belgium v Senegal (round of 32).",
    "3,000th World Cup goal all-time: Enzo Fernández v Egypt (round of 16).",
    "Germany's first-ever World Cup shootout defeat (v Paraguay, round of 32).",
    "Cape Verde: smallest nation ever to play at a World Cup.",
    "Michael Olise: 5 assists — most in a single World Cup since 1994.",
    "First World Cup with three players scoring 7+ goals."
  ].forEach(x => ul.append(el("li", null, x)));
  panel.append(ul);

  panel.append(el("p", "footnote",
    "Compiled from Wikipedia (2026 FIFA World Cup + knockout-stage pages), FIFA.com match centre, ESPN, Goal.com, NBC Sports and FOX Sports, cross-checked July 16, 2026. " +
    "Where sources disagree (total goals 294–297; a few group-stage point tallies) the most-cited figure is shown. Built as a static, client-side page — no data is fetched."));
})();
if (new URLSearchParams(location.hash.slice(1)).has("data")) toggler();
</script>
