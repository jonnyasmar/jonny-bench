<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Space Shooter</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
      }
      #ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        color: white;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      }
      .hud {
        display: flex;
        justify-content: space-between;
        padding: 20px;
        font-size: 24px;
        font-weight: bold;
      }
      #score {
        color: #4facfe;
      }
      #lives {
        color: #f093fb;
      }
      #start-screen, #game-over-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.7);
        pointer-events: auto;
        backdrop-filter: blur(5px);
        transition: opacity 0.3s;
      }
      .hidden {
        opacity: 0;
        pointer-events: none !important;
      }
      h1 {
        font-size: 64px;
        margin-bottom: 20px;
        background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      button {
        padding: 15px 40px;
        font-size: 24px;
        font-weight: bold;
        color: white;
        background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
        border: none;
        border-radius: 30px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
      }
      button:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
      }
      .instructions {
        margin-top: 30px;
        font-size: 18px;
        text-align: center;
        color: #ccc;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-DXOWgmYW.js"></script>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="ui-layer">
      <div class="hud hidden" id="game-hud">
        <div id="score">Score: 0</div>
        <div id="lives">Lives: 3</div>
      </div>
      
      <div id="start-screen">
        <h1>NEON DRIFTER</h1>
        <button id="start-btn">START GAME</button>
        <div class="instructions">
          Use WASD or Arrow Keys to move.<br>
          Spacebar to shoot.
        </div>
      </div>

      <div id="game-over-screen" class="hidden">
        <h1>GAME OVER</h1>
        <div style="font-size: 32px; margin-bottom: 30px;">Final Score: <span id="final-score">0</span></div>
        <button id="restart-btn">PLAY AGAIN</button>
      </div>
    </div>
  </body>
</html>
