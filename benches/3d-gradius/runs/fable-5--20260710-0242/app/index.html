<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>VOIDSURGE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #06030f;
  font-family: 'Courier New', 'Lucida Console', Monaco, monospace;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

canvas { display: block; }

.hidden { display: none !important; }

.hud {
  position: fixed; inset: 0;
  pointer-events: none;
  color: #cfe8ff;
  z-index: 10;
}

/* CRT dressing */
.hud::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.13) 0 1px, transparent 1px 3px);
  mix-blend-mode: overlay;
  opacity: 0.55;
}
.hud::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(2,0,12,0.55) 100%);
}

.hud-top {
  position: absolute; top: 14px; left: 22px; right: 22px;
  display: flex; justify-content: space-between; align-items: flex-start;
  z-index: 3;
}
.hud-box { min-width: 130px; }
.hud-center-box { text-align: center; }
.hud-right-box { text-align: right; }
.hud-label {
  font-size: 11px; letter-spacing: 0.4em; opacity: 0.6;
}
.hud-value {
  font-size: 26px; font-weight: bold; letter-spacing: 0.12em;
  text-shadow: 0 0 12px rgba(120,220,255,0.8);
}
.hud-dim { opacity: 0.75; font-size: 20px; }

.hud-mult {
  font-size: 24px; font-weight: bold; color: #ffd35a; min-height: 28px;
  text-shadow: 0 0 14px rgba(255,211,90,0.9);
}
.hud-mult.pop { animation: pop 0.25s ease-out; }
@keyframes pop {
  0% { transform: scale(1.7); }
  100% { transform: scale(1); }
}

.hud-lives { margin-top: 4px; font-size: 18px; }
.life {
  color: #54e0ff; margin-left: 7px;
  display: inline-block; transform: rotate(90deg);
  text-shadow: 0 0 10px rgba(84,224,255,0.9);
}

/* Boss bar */
.boss-wrap {
  position: absolute; top: 66px; left: 50%; transform: translateX(-50%);
  width: min(520px, 70vw); text-align: center; z-index: 3;
}
.boss-name {
  font-size: 13px; letter-spacing: 0.5em; color: #ff8df0;
  text-shadow: 0 0 12px rgba(255,90,210,0.9);
  margin-bottom: 5px;
}
.boss-bar {
  height: 10px; border: 1px solid rgba(255,141,240,0.6);
  background: rgba(40,8,40,0.6);
  box-shadow: 0 0 14px rgba(255,90,210,0.35), inset 0 0 8px rgba(0,0,0,0.6);
}
.boss-fill {
  height: 100%; width: 100%;
  background: linear-gradient(90deg, #ff5ad2, #8a5cff);
  box-shadow: 0 0 12px rgba(255,90,210,0.9);
  transition: width 0.15s ease-out;
}

/* Surge chain meter */
.chain {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; z-index: 3;
}
.slot {
  width: 84px; padding: 7px 0 6px;
  text-align: center;
  border: 1px solid rgba(120,200,255,0.28);
  background: rgba(10,10,34,0.55);
  color: rgba(180,220,255,0.4);
  transition: all 0.15s ease-out;
}
.slot-key { font-size: 11px; letter-spacing: 0.18em; font-weight: bold; }
.slot.lit {
  color: #0a0a20;
  background: rgba(90,190,235,0.75);
  border-color: rgba(160,240,255,0.9);
  box-shadow: 0 0 12px rgba(90,200,255,0.5);
}
.slot.active {
  background: #ffd35a;
  border-color: #fff0b0;
  box-shadow: 0 0 20px rgba(255,211,90,0.95);
  animation: slotThrob 0.7s ease-in-out infinite alternate;
}
@keyframes slotThrob {
  from { box-shadow: 0 0 10px rgba(255,211,90,0.6); }
  to { box-shadow: 0 0 24px rgba(255,211,90,1); }
}
.chain.full .slot.active { background: #ff8df0; border-color: #ffd0f8; }
.chain.pulse { animation: chainPulse 0.3s ease-out; }
@keyframes chainPulse {
  0% { transform: translateX(-50%) scale(1.06); }
  100% { transform: translateX(-50%) scale(1); }
}
.chain-hint {
  position: absolute; bottom: 62px; left: 50%; transform: translateX(-50%);
  font-size: 12px; letter-spacing: 0.22em; color: #ffd35a;
  text-shadow: 0 0 10px rgba(255,211,90,0.7);
  z-index: 3; white-space: nowrap;
}

/* Center messages */
.msg {
  position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
  font-size: 34px; font-weight: bold; letter-spacing: 0.5em; text-align: center;
  text-shadow: 0 0 22px rgba(120,220,255,0.9);
  animation: msgIn 0.35s ease-out;
  z-index: 4; white-space: nowrap;
}
.msg .msg-sub {
  display: block; font-size: 13px; letter-spacing: 0.3em; opacity: 0.75;
  margin-top: 10px; font-weight: normal;
}
.msg.warning { color: #ff5a7e; text-shadow: 0 0 24px rgba(255,60,110,1); animation: msgIn 0.35s ease-out, warnBlink 0.5s step-end infinite; }
.msg.good { color: #8fffe0; text-shadow: 0 0 22px rgba(90,255,200,0.9); }
@keyframes msgIn {
  from { opacity: 0; transform: translate(-50%, -50%) scale(1.4); }
  to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}
@keyframes warnBlink { 50% { opacity: 0.55; } }

/* Flash overlay */
.flash {
  position: absolute; inset: 0; opacity: 0; z-index: 5;
}

/* Popups */
.popups { position: absolute; inset: 0; overflow: hidden; z-index: 4; }
.popup {
  position: absolute;
  transform: translate(-50%, -50%);
  font-size: 15px; font-weight: bold; letter-spacing: 0.1em;
  color: #dff4ff; text-shadow: 0 0 8px rgba(140,230,255,0.9);
  animation: popupFloat 0.9s ease-out forwards;
}
.popup-big { color: #ffd35a; font-size: 18px; text-shadow: 0 0 12px rgba(255,211,90,1); }
.popup-mult { color: #ffd35a; font-size: 17px; }
.popup-surge { color: #8fffe0; font-size: 19px; text-shadow: 0 0 14px rgba(90,255,200,1); }
@keyframes popupFloat {
  0% { opacity: 0; margin-top: 6px; }
  12% { opacity: 1; }
  100% { opacity: 0; margin-top: -44px; }
}

/* Screens */
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; z-index: 6;
  background: radial-gradient(ellipse at center, rgba(5,2,18,0.25) 0%, rgba(5,2,18,0.72) 100%);
}
.game-title {
  font-size: clamp(44px, 9vw, 96px);
  font-weight: bold; letter-spacing: 0.28em; color: #e8f6ff;
  text-shadow: 0 0 18px rgba(120,220,255,0.9), 0 0 60px rgba(90,140,255,0.55);
}
.game-title .accent {
  color: #ff8df0;
  text-shadow: 0 0 18px rgba(255,90,210,0.95), 0 0 60px rgba(255,90,210,0.5);
}
.game-sub {
  margin-top: 6px; font-size: 14px; letter-spacing: 0.5em; opacity: 0.7; color: #9fd0ff;
}
.title-hi { margin-top: 26px; font-size: 15px; letter-spacing: 0.3em; color: #ffd35a; text-shadow: 0 0 10px rgba(255,211,90,0.8); }
.title-start {
  margin-top: 30px; font-size: 18px; letter-spacing: 0.3em; color: #dff4ff;
}
.title-start b { color: #54e0ff; }
.blink { animation: blink 1.1s step-end infinite; }
@keyframes blink { 50% { opacity: 0.25; } }
.title-controls {
  margin-top: 40px; font-size: 12.5px; letter-spacing: 0.14em; line-height: 2.1;
  color: #8fb4dd;
}
.title-controls b { color: #cfe8ff; }
.title-controls .dim { opacity: 0.75; }
.shard-ico { color: #ffd35a; text-shadow: 0 0 8px rgba(255,211,90,0.9); }

.over-title {
  font-size: clamp(34px, 6vw, 64px); font-weight: bold; letter-spacing: 0.4em;
  color: #ff5a7e; text-shadow: 0 0 24px rgba(255,60,110,0.9);
}
.over-score { margin-top: 24px; font-size: 24px; letter-spacing: 0.2em; }
.over-best { margin-top: 10px; font-size: 15px; letter-spacing: 0.25em; opacity: 0.8; }
.record {
  color: #ffd35a; text-shadow: 0 0 16px rgba(255,211,90,1);
  animation: blink 0.7s step-end infinite;
}

.pause-screen { background: rgba(4,2,14,0.55); }
.msg-big {
  font-size: 40px; font-weight: bold; letter-spacing: 0.6em; color: #cfe8ff;
  text-shadow: 0 0 20px rgba(120,220,255,0.9);
}

.mute-ind {
  position: absolute; bottom: 18px; right: 22px;
  font-size: 11px; letter-spacing: 0.3em; color: #ff5a7e; opacity: 0.8; z-index: 3;
}

</style>
</head>
