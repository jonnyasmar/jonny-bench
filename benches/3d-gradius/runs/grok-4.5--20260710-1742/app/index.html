<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>VOID DRIFT — 3D Side Scroller</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="game-root">
    <canvas id="c"></canvas>

    <!-- HUD -->
    <div id="hud" class="hidden">
      <div class="hud-top">
        <div class="hud-block">
          <span class="label">SCORE</span>
          <span id="score" class="value">0</span>
        </div>
        <div class="hud-block center">
          <span class="label">WAVE</span>
          <span id="wave" class="value">1</span>
        </div>
        <div class="hud-block right">
          <span class="label">HI</span>
          <span id="hiscore" class="value">0</span>
        </div>
      </div>
      <div class="hud-bottom">
        <div class="bars">
          <div class="bar-row">
            <span class="bar-label">HULL</span>
            <div class="bar-track"><div id="hp-bar" class="bar-fill hp"></div></div>
            <span id="hp-text" class="bar-num">5</span>
          </div>
          <div class="bar-row">
            <span class="bar-label">SHIELD</span>
            <div class="bar-track"><div id="shield-bar" class="bar-fill shield"></div></div>
            <span id="shield-text" class="bar-num">0</span>
          </div>
        </div>
        <div class="power-pips" id="power-pips"></div>
        <div class="lives" id="lives"></div>
      </div>
      <div id="boss-bar-wrap" class="hidden">
        <span class="boss-name" id="boss-name">ENTITY</span>
        <div class="bar-track boss"><div id="boss-bar" class="bar-fill boss"></div></div>
      </div>
      <div id="toast" class="toast hidden"></div>
    </div>

    <!-- Title -->
    <div id="title-screen" class="overlay">
      <div class="scanlines"></div>
      <div class="title-inner">
        <p class="eyebrow">SECTOR 7 · DEEP VOID</p>
        <h1 class="title">VOID<span>DRIFT</span></h1>
        <p class="tagline">Break the formation. Claim the core.</p>
        <button id="btn-start" class="btn primary">ENGAGE</button>
        <div class="controls-hint">
          <div><kbd>WASD</kbd> / <kbd>Arrows</kbd> move</div>
          <div><kbd>Space</kbd> / <kbd>Z</kbd> fire · hold to stream</div>
          <div><kbd>P</kbd> pause · <kbd>M</kbd> mute</div>
        </div>
      </div>
    </div>

    <!-- Pause -->
    <div id="pause-screen" class="overlay hidden">
      <div class="panel">
        <h2>PAUSED</h2>
        <button id="btn-resume" class="btn primary">RESUME</button>
        <button id="btn-quit" class="btn ghost">ABORT</button>
      </div>
    </div>

    <!-- Game Over -->
    <div id="gameover-screen" class="overlay hidden">
      <div class="panel">
        <h2 id="go-title">SHIP LOST</h2>
        <p class="go-score">SCORE <span id="go-score">0</span></p>
        <p class="go-wave">WAVE <span id="go-wave">1</span></p>
        <button id="btn-retry" class="btn primary">REDEPLOY</button>
        <button id="btn-menu" class="btn ghost">MAINFRAME</button>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "./js/three.module.min.js"
    }
  }
  </script>
  <script type="module" src="./js/game.js"></script>
</body>
</html>
