<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Starwake Rift</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #061016;
      --panel: rgba(8, 18, 25, 0.76);
      --line: rgba(178, 224, 232, 0.22);
      --text: #eef9fb;
      --muted: #9fb7bd;
      --teal: #3ff3df;
      --amber: #ffd166;
      --rose: #ff4f8f;
      --green: #75ff88;
      --blue: #7db8ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      touch-action: none;
      user-select: none;
    }

    #game {
      position: fixed;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 20% 20%, rgba(63, 243, 223, 0.13), transparent 28%),
        radial-gradient(circle at 80% 70%, rgba(255, 209, 102, 0.08), transparent 24%),
        #061016;
    }

    .hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      padding: 12px;
      pointer-events: none;
      z-index: 5;
    }

    .readout {
      min-height: 54px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(10, 24, 34, 0.82), rgba(6, 13, 18, 0.58));
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(12px);
      border-radius: 8px;
    }

    .readout span {
      display: block;
      font-size: 10px;
      line-height: 1.1;
      text-transform: uppercase;
      color: var(--muted);
    }

    .readout strong {
      display: block;
      margin-top: 3px;
      font-size: clamp(15px, 2vw, 22px);
      line-height: 1.15;
      font-variant-numeric: tabular-nums;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bar {
      position: relative;
      width: 100%;
      height: 7px;
      margin-top: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(238, 249, 251, 0.13);
    }

    .bar i {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--green));
      transition: width 120ms linear;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(circle at 42% 40%, rgba(63, 243, 223, 0.11), transparent 32%),
        linear-gradient(180deg, rgba(6, 16, 22, 0.36), rgba(6, 16, 22, 0.9));
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    .overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .dialog {
      width: min(680px, 100%);
      padding: clamp(20px, 4vw, 34px);
      border: 1px solid rgba(238, 249, 251, 0.18);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(9, 23, 31, 0.9), rgba(5, 12, 17, 0.88));
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.44);
      backdrop-filter: blur(18px);
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 8vw, 92px);
      line-height: 0.9;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .kicker {
      margin: 0 0 10px;
      color: var(--teal);
      font-size: 13px;
      text-transform: uppercase;
      font-weight: 800;
    }

    .copy {
      max-width: 58ch;
      margin: 18px 0 0;
      color: #c7d9de;
      font-size: 16px;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    button {
      min-width: 132px;
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid rgba(238, 249, 251, 0.24);
      border-radius: 8px;
      background: rgba(238, 249, 251, 0.08);
      color: var(--text);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button.primary {
      border-color: rgba(63, 243, 223, 0.8);
      background: linear-gradient(180deg, rgba(63, 243, 223, 0.3), rgba(42, 126, 145, 0.28));
      color: #f7ffff;
      box-shadow: 0 0 24px rgba(63, 243, 223, 0.18);
    }

    .notice {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 6;
      width: min(620px, calc(100% - 28px));
      transform: translateX(-50%);
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(7, 15, 21, 0.68);
      color: #c9dde1;
      text-align: center;
      font-size: 13px;
      backdrop-filter: blur(12px);
      pointer-events: none;
    }

    .flash {
      position: fixed;
      inset: 0;
      z-index: 4;
      opacity: 0;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.45), transparent 62%);
      pointer-events: none;
      mix-blend-mode: screen;
      transition: opacity 90ms linear;
    }

    @media (max-width: 680px) {
      .hud {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        padding: 8px;
      }

      .readout {
        min-height: 48px;
        padding: 7px 8px;
      }

      .hide-small {
        display: none;
      }

      .notice {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud" aria-hidden="true">
    <div class="readout"><span>Score</span><strong id="score">0</strong></div>
    <div class="readout"><span>Lives</span><strong id="lives">3</strong></div>
    <div class="readout"><span>Shield</span><strong id="shieldText">100%</strong><div class="bar"><i id="shieldBar"></i></div></div>
    <div class="readout hide-small"><span>Weapon</span><strong id="weapon">Pulse I</strong></div>
    <div class="readout hide-small"><span>Rift</span><strong id="rift">1.0x</strong></div>
  </div>

  <div class="notice" id="notice">Rift telemetry online.</div>
  <div class="flash" id="flash"></div>

  <section class="overlay" id="menu">
    <div class="dialog">
      <p class="kicker">Side-scroll survival shooter</p>
      <h1>Starwake Rift</h1>
      <p class="copy">Slip through a fractured shipping lane, collect unstable cores, and outlast the machine reef as the rift accelerates.</p>
      <div class="actions">
        <button class="primary" id="startBtn">Start Run</button>
        <button id="muteBtn">Sound On</button>
      </div>
    </div>
  </section>

  <script type="module">
    import * as THREE from './vendor/three.module.min.js';

    const canvas = document.getElementById('game');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const shieldTextEl = document.getElementById('shieldText');
    const shieldBarEl = document.getElementById('shieldBar');
    const weaponEl = document.getElementById('weapon');
    const riftEl = document.getElementById('rift');
    const menuEl = document.getElementById('menu');
    const startBtn = document.getElementById('startBtn');
    const muteBtn = document.getElementById('muteBtn');
    const noticeEl = document.getElementById('notice');
    const flashEl = document.getElementById('flash');

    const WORLD = { left: -10.7, right: 10.7, top: 5.25, bottom: -5.25 };
    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
    const rand = (min, max) => min + Math.random() * (max - min);
    const chance = (value) => Math.random() < value;

    let renderer;
    let scene;
    let camera;
    let clock;
    let player;
    let playerLight;
    let tunnel;
    let starLayers = [];
    let terrain = [];
    let bullets = [];
    let enemies = [];
    let enemyBullets = [];
    let particles = [];
    let powerups = [];
    let shockwaves = [];
    let boss = null;
    let rafId = 0;
    let audio = null;
    let shake = 0;
    let flash = 0;
    let spawnTimer = 0;
    let terrainTimer = 0;
    let bossTimer = 0;
    let lastTime = 0;
    let state = 'menu';
    let highScore = Number(localStorage.getItem('starwakeHighScore') || 0);

    const keys = new Set();
    const pointer = { active: false, x: 0, y: 0, fire: false };

    const game = {
      score: 0,
      lives: 3,
      shield: 100,
      maxShield: 100,
      weapon: 1,
      weaponHeat: 0,
      fireCooldown: 0,
      invulnerable: 0,
      time: 0,
      rift: 1,
      combo: 1,
      comboTimer: 0,
      muted: false,
      paused: false,
      bossDefeated: false
    };

    const materials = {};

    init();

    function init() {
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false, powerPreference: 'high-performance' });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.15;

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x061016);
      scene.fog = new THREE.FogExp2(0x061016, 0.035);

      camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 120);
      camera.position.set(0, 0, 18);
      camera.lookAt(0, 0, 0);

      clock = new THREE.Clock();
      makeMaterials();
      makeLights();
      makeBackground();
      makePlayer();
      bindEvents();
      updateHud();
      animate(0);
    }

    function makeMaterials() {
      materials.player = new THREE.MeshStandardMaterial({ color: 0xdafcff, emissive: 0x1ccbc0, emissiveIntensity: 0.55, roughness: 0.28, metalness: 0.78 });
      materials.playerDark = new THREE.MeshStandardMaterial({ color: 0x144a58, emissive: 0x071b22, roughness: 0.35, metalness: 0.72 });
      materials.canopy = new THREE.MeshStandardMaterial({ color: 0x86efff, emissive: 0x2ccce8, emissiveIntensity: 0.8, roughness: 0.08, metalness: 0.15, transparent: true, opacity: 0.78 });
      materials.thruster = new THREE.MeshBasicMaterial({ color: 0x3ff3df, transparent: true, opacity: 0.9 });
      materials.bullet = new THREE.MeshBasicMaterial({ color: 0xefffff });
      materials.enemy = new THREE.MeshStandardMaterial({ color: 0xff4f8f, emissive: 0x6d1134, emissiveIntensity: 0.75, roughness: 0.32, metalness: 0.55 });
      materials.enemyAlt = new THREE.MeshStandardMaterial({ color: 0xffd166, emissive: 0x7d3f00, emissiveIntensity: 0.65, roughness: 0.42, metalness: 0.4 });
      materials.enemyBullet = new THREE.MeshBasicMaterial({ color: 0xff6b4f });
      materials.power = new THREE.MeshStandardMaterial({ color: 0x75ff88, emissive: 0x24c967, emissiveIntensity: 1.2, roughness: 0.18, metalness: 0.25 });
      materials.rock = new THREE.MeshStandardMaterial({ color: 0x3d5960, emissive: 0x061319, roughness: 0.82, metalness: 0.1 });
      materials.boss = new THREE.MeshStandardMaterial({ color: 0x7db8ff, emissive: 0x2640aa, emissiveIntensity: 0.72, roughness: 0.26, metalness: 0.62 });
    }

    function makeLights() {
      scene.add(new THREE.AmbientLight(0x9edee7, 0.38));
      const key = new THREE.DirectionalLight(0xffffff, 1.4);
      key.position.set(-3, 5, 9);
      scene.add(key);
      const rim = new THREE.DirectionalLight(0xffd166, 0.75);
      rim.position.set(7, -3, 5);
      scene.add(rim);
      playerLight = new THREE.PointLight(0x3ff3df, 1.1, 8);
      scene.add(playerLight);
    }

    function makeBackground() {
      for (let i = 0; i < 3; i += 1) {
        const count = [520, 320, 180][i];
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);
        const palette = [new THREE.Color(0x9ffdf2), new THREE.Color(0xffd166), new THREE.Color(0x7db8ff), new THREE.Color(0xffffff)];
        for (let j = 0; j < count; j += 1) {
          positions[j * 3] = rand(WORLD.left - 4, WORLD.right + 26);
          positions[j * 3 + 1] = rand(WORLD.bottom - 3, WORLD.top + 3);
          positions[j * 3 + 2] = rand(-24 - i * 7, -12 - i * 3);
          const c = palette[Math.floor(Math.random() * palette.length)];
          colors[j * 3] = c.r;
          colors[j * 3 + 1] = c.g;
          colors[j * 3 + 2] = c.b;
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const mat = new THREE.PointsMaterial({ size: [0.035, 0.06, 0.09][i], vertexColors: true, transparent: true, opacity: [0.52, 0.7, 0.95][i], depthWrite: false });
        const points = new THREE.Points(geo, mat);
        points.userData.speed = [1.1, 1.9, 3.2][i];
        starLayers.push(points);
        scene.add(points);
      }

      tunnel = new THREE.Group();
      const ringGeo = new THREE.TorusGeometry(7.2, 0.018, 6, 96);
      for (let i = 0; i < 24; i += 1) {
        const mat = new THREE.MeshBasicMaterial({ color: i % 2 ? 0x193947 : 0x264e50, transparent: true, opacity: 0.2 });
        const ring = new THREE.Mesh(ringGeo, mat);
        ring.position.set(rand(WORLD.left, WORLD.right + 20), 0, -18 - i * 0.5);
        ring.rotation.set(Math.PI / 2, 0, 0);
        ring.scale.setScalar(rand(0.7, 1.25));
        ring.userData.speed = rand(1.6, 2.7);
        tunnel.add(ring);
      }
      scene.add(tunnel);
    }

    function makePlayer() {
      player = new THREE.Group();
      const body = new THREE.Mesh(new THREE.ConeGeometry(0.48, 1.65, 4), materials.player);
      body.rotation.z = -Math.PI / 2;
      body.scale.y = 1.15;
      player.add(body);

      const spine = new THREE.Mesh(new THREE.BoxGeometry(1.05, 0.2, 0.22), materials.playerDark);
      spine.position.set(-0.08, 0, 0);
      player.add(spine);

      const wingGeo = new THREE.BoxGeometry(0.76, 0.12, 0.12);
      const wingTop = new THREE.Mesh(wingGeo, materials.playerDark);
      wingTop.position.set(-0.28, 0.47, 0);
      wingTop.rotation.z = -0.48;
      const wingBot = wingTop.clone();
      wingBot.position.y = -0.47;
      wingBot.rotation.z = 0.48;
      player.add(wingTop, wingBot);

      const canopy = new THREE.Mesh(new THREE.SphereGeometry(0.18, 18, 10), materials.canopy);
      canopy.scale.set(1.25, 0.75, 0.64);
      canopy.position.set(0.23, 0, 0.12);
      player.add(canopy);

      const flame = new THREE.Mesh(new THREE.ConeGeometry(0.24, 0.7, 18), materials.thruster);
      flame.rotation.z = Math.PI / 2;
      flame.position.x = -0.86;
      flame.name = 'flame';
      player.add(flame);

      player.position.set(WORLD.left + 2.5, 0, 0);
      player.userData.radius = 0.46;
      scene.add(player);
    }

    function bindEvents() {
      startBtn.addEventListener('click', startGame);
      muteBtn.addEventListener('click', () => {
        game.muted = !game.muted;
        muteBtn.textContent = game.muted ? 'Sound Off' : 'Sound On';
      });

      window.addEventListener('resize', onResize);
      window.addEventListener('keydown', (event) => {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(event.code)) event.preventDefault();
        keys.add(event.code);
        if (event.code === 'Enter' && !event.repeat && state !== 'playing') startGame();
        if (event.code === 'KeyP' && !event.repeat && state === 'playing') togglePause();
      });
      window.addEventListener('keyup', (event) => keys.delete(event.code));

      window.addEventListener('pointerdown', (event) => {
        if (event.target.closest('button')) return;
        pointer.active = true;
        pointer.fire = true;
        updatePointer(event);
      });
      window.addEventListener('pointermove', (event) => {
        if (pointer.active) updatePointer(event);
      });
      window.addEventListener('pointerup', () => {
        pointer.active = false;
        pointer.fire = false;
      });
      window.addEventListener('pointercancel', () => {
        pointer.active = false;
        pointer.fire = false;
      });
      window.addEventListener('blur', () => {
        keys.clear();
        if (state === 'playing' && !game.paused) togglePause(true);
      });
    }

    function onResize() {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    }

    function updatePointer(event) {
      const nx = event.clientX / window.innerWidth;
      const ny = event.clientY / window.innerHeight;
      pointer.x = WORLD.left + nx * (WORLD.right - WORLD.left);
      pointer.y = WORLD.top - ny * (WORLD.top - WORLD.bottom);
    }

    function startGame() {
      if (state === 'playing') return;
      ensureAudio();
      resetGame();
      state = 'playing';
      menuEl.classList.add('hidden');
      noticeEl.textContent = 'Collect green cores for shields and weapon upgrades. Survive until the sentinel arrives.';
      clock.getDelta();
      ping(220, 0.09, 'triangle', 0.04);
    }

    function resetGame() {
      clearArray(bullets);
      clearArray(enemies);
      clearArray(enemyBullets);
      clearArray(particles);
      clearArray(powerups);
      clearArray(shockwaves);
      terrain.forEach((item) => scene.remove(item.mesh));
      terrain = [];
      if (boss) {
        scene.remove(boss.mesh);
        boss = null;
      }
      Object.assign(game, {
        score: 0,
        lives: 3,
        shield: 100,
        maxShield: 100,
        weapon: 1,
        weaponHeat: 0,
        fireCooldown: 0,
        invulnerable: 1.8,
        time: 0,
        rift: 1,
        combo: 1,
        comboTimer: 0,
        paused: false,
        bossDefeated: false
      });
      spawnTimer = 0.9;
      terrainTimer = 0.4;
      bossTimer = 70;
      shake = 0;
      flash = 0;
      player.position.set(WORLD.left + 2.5, 0, 0);
      player.visible = true;
      updateHud();
    }

    function clearArray(items) {
      for (const item of items) scene.remove(item.mesh);
      items.length = 0;
    }

    function togglePause(force) {
      game.paused = force === true ? true : !game.paused;
      noticeEl.textContent = game.paused ? 'Paused. Press P to resume.' : 'Collect green cores for shields and weapon upgrades. Survive until the sentinel arrives.';
    }

    function animate(time) {
      rafId = requestAnimationFrame(animate);
      const rawDt = Math.min(0.033, (time - lastTime) / 1000 || clock.getDelta());
      lastTime = time;
      const dt = game.paused ? 0 : rawDt;

      if (state === 'playing' && dt > 0) updateGame(dt);
      updateBackground(rawDt);
      render(rawDt);
    }

    function updateGame(dt) {
      game.time += dt;
      game.rift = 1 + Math.min(1.9, game.time / 72);
      game.fireCooldown -= dt;
      game.invulnerable = Math.max(0, game.invulnerable - dt);
      game.comboTimer = Math.max(0, game.comboTimer - dt);
      if (game.comboTimer === 0) game.combo = 1;
      if (game.shield < game.maxShield) game.shield = Math.min(game.maxShield, game.shield + dt * 1.8);

      updatePlayer(dt);
      updateWeapons(dt);
      spawnThings(dt);
      updateBullets(dt);
      updateEnemies(dt);
      updateEnemyBullets(dt);
      updatePowerups(dt);
      updateTerrain(dt);
      updateParticles(dt);
      updateShockwaves(dt);
      updateBoss(dt);
      updateCollisions();
      updateHud();
    }

    function updatePlayer(dt) {
      const speed = keys.has('ShiftLeft') || keys.has('ShiftRight') ? 4.1 : 6.4;
      let mx = 0;
      let my = 0;
      if (keys.has('KeyA') || keys.has('ArrowLeft')) mx -= 1;
      if (keys.has('KeyD') || keys.has('ArrowRight')) mx += 1;
      if (keys.has('KeyW') || keys.has('ArrowUp')) my += 1;
      if (keys.has('KeyS') || keys.has('ArrowDown')) my -= 1;
      if (mx || my) {
        const length = Math.hypot(mx, my);
        player.position.x += (mx / length) * speed * dt;
        player.position.y += (my / length) * speed * dt;
      }
      if (pointer.active) {
        player.position.x += (pointer.x - player.position.x) * Math.min(1, dt * 7.5);
        player.position.y += (pointer.y - player.position.y) * Math.min(1, dt * 7.5);
      }
      player.position.x = clamp(player.position.x, WORLD.left + 0.8, WORLD.right - 2.1);
      player.position.y = clamp(player.position.y, WORLD.bottom + 0.6, WORLD.top - 0.6);

      const tilt = clamp((my || (pointer.active ? pointer.y - player.position.y : 0)) * 0.18, -0.42, 0.42);
      player.rotation.x += (tilt - player.rotation.x) * Math.min(1, dt * 8);
      player.rotation.y += ((-mx * 0.14) - player.rotation.y) * Math.min(1, dt * 7);
      player.children.find((child) => child.name === 'flame').scale.x = 1 + Math.sin(game.time * 28) * 0.12 + game.rift * 0.08;
      player.visible = !(game.invulnerable > 0 && Math.floor(game.invulnerable * 18) % 2 === 0);
      playerLight.position.copy(player.position).add(new THREE.Vector3(-0.8, 0, 1.6));
    }

    function updateWeapons(dt) {
      const firing = keys.has('Space') || pointer.fire;
      if (!firing || game.fireCooldown > 0) return;
      const cadence = [0, 0.18, 0.145, 0.115, 0.095][game.weapon] || 0.09;
      game.fireCooldown = cadence;
      shootPlayerBullet(0, 0);
      if (game.weapon >= 2) {
        shootPlayerBullet(0, 0.28);
        shootPlayerBullet(0, -0.28);
      }
      if (game.weapon >= 3) {
        shootPlayerBullet(0.08, 0.52, 0.4);
        shootPlayerBullet(0.08, -0.52, -0.4);
      }
      if (game.weapon >= 4 && chance(0.45)) {
        shootPlayerBullet(0.16, 0, 0, true);
      }
      ping(580 + game.weapon * 60, 0.035, 'square', 0.018);
    }

    function shootPlayerBullet(dx, dy, vy = 0, heavy = false) {
      const geo = heavy ? new THREE.SphereGeometry(0.16, 16, 8) : new THREE.CapsuleGeometry(0.055, 0.5, 8, 12);
      const mesh = new THREE.Mesh(geo, materials.bullet);
      mesh.rotation.z = Math.PI / 2;
      mesh.position.set(player.position.x + 0.7 + dx, player.position.y + dy, 0);
      mesh.scale.set(1.5, 1, 1);
      scene.add(mesh);
      bullets.push({ mesh, vx: heavy ? 14 : 17.5, vy, life: 1.6, radius: heavy ? 0.25 : 0.17, damage: heavy ? 3 : 1 });
    }

    function spawnThings(dt) {
      spawnTimer -= dt;
      terrainTimer -= dt;
      bossTimer -= dt;
      if (bossTimer <= 0 && !boss && !game.bossDefeated) {
        spawnBoss();
      }
      if (terrainTimer <= 0) {
        terrainTimer = rand(0.9, 1.8) / game.rift;
        spawnTerrain();
      }
      if (boss) return;
      if (spawnTimer <= 0) {
        const difficulty = clamp(game.rift, 1, 2.9);
        spawnTimer = rand(0.38, 0.98) / difficulty;
        const roll = Math.random();
        if (game.time > 24 && roll < 0.24) spawnEnemy('splitter');
        else if (game.time > 12 && roll < 0.54) spawnEnemy('dart');
        else spawnEnemy('drone');
        if (game.time > 34 && chance(0.2)) spawnEnemy('turret');
      }
    }

    function spawnEnemy(type) {
      const group = new THREE.Group();
      let radius = 0.45;
      let hp = 2;
      let speed = rand(2.4, 3.7) * game.rift;
      let value = 100;
      if (type === 'drone') {
        const mesh = new THREE.Mesh(new THREE.OctahedronGeometry(0.38, 1), materials.enemy);
        group.add(mesh);
      } else if (type === 'dart') {
        const mesh = new THREE.Mesh(new THREE.ConeGeometry(0.42, 1.15, 5), materials.enemyAlt);
        mesh.rotation.z = Math.PI / 2;
        group.add(mesh);
        radius = 0.5;
        hp = 3;
        speed = rand(3.4, 5.0) * game.rift;
        value = 160;
      } else if (type === 'splitter') {
        const mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(0.48, 1), materials.enemy);
        group.add(mesh);
        hp = 5;
        radius = 0.56;
        speed = rand(2.0, 2.9) * game.rift;
        value = 250;
      } else {
        const core = new THREE.Mesh(new THREE.SphereGeometry(0.42, 16, 10), materials.enemyAlt);
        const ring = new THREE.Mesh(new THREE.TorusGeometry(0.58, 0.045, 8, 24), materials.enemy);
        group.add(core, ring);
        hp = 4;
        radius = 0.65;
        speed = rand(1.8, 2.5) * game.rift;
        value = 220;
      }
      group.position.set(WORLD.right + 1.2, rand(WORLD.bottom + 0.8, WORLD.top - 0.8), rand(-0.5, 0.5));
      scene.add(group);
      enemies.push({ mesh: group, type, hp, maxHp: hp, speed, radius, value, phase: rand(0, Math.PI * 2), shoot: rand(0.6, 1.6) });
    }

    function spawnTerrain() {
      const y = chance(0.5) ? WORLD.top + 0.6 : WORLD.bottom - 0.6;
      const scale = rand(0.65, 1.45);
      const mesh = new THREE.Mesh(new THREE.DodecahedronGeometry(scale, 0), materials.rock);
      mesh.position.set(WORLD.right + 1.4, y, rand(-0.9, 0.4));
      mesh.rotation.set(rand(0, 3), rand(0, 3), rand(0, 3));
      scene.add(mesh);
      terrain.push({ mesh, radius: scale * 0.74, vx: rand(2.4, 3.6) * game.rift, spin: rand(-1.2, 1.2), hostile: Math.abs(y) < WORLD.top + 0.1 });
    }

    function spawnBoss() {
      const group = new THREE.Group();
      const core = new THREE.Mesh(new THREE.IcosahedronGeometry(1.05, 2), materials.boss);
      const ring1 = new THREE.Mesh(new THREE.TorusGeometry(1.55, 0.08, 10, 64), materials.enemy);
      const ring2 = new THREE.Mesh(new THREE.TorusGeometry(2.05, 0.06, 10, 64), materials.enemyAlt);
      ring1.rotation.x = Math.PI / 2;
      ring2.rotation.y = Math.PI / 2;
      group.add(core, ring1, ring2);
      group.position.set(WORLD.right + 2.8, 0, 0);
      scene.add(group);
      boss = { mesh: group, hp: 180, maxHp: 180, radius: 1.55, phase: 0, shoot: 1.1, volley: 0, entry: true };
      noticeEl.textContent = 'Rift sentinel incoming.';
      shake = Math.max(shake, 0.7);
      ping(110, 0.35, 'sawtooth', 0.06);
    }

    function updateBullets(dt) {
      for (let i = bullets.length - 1; i >= 0; i -= 1) {
        const bullet = bullets[i];
        bullet.mesh.position.x += bullet.vx * dt;
        bullet.mesh.position.y += bullet.vy * dt;
        bullet.life -= dt;
        bullet.mesh.rotation.x += dt * 8;
        if (bullet.life <= 0 || bullet.mesh.position.x > WORLD.right + 2) removeAt(bullets, i);
      }
    }

    function updateEnemies(dt) {
      for (let i = enemies.length - 1; i >= 0; i -= 1) {
        const enemy = enemies[i];
        enemy.phase += dt;
        enemy.mesh.position.x -= enemy.speed * dt;
        if (enemy.type === 'drone') enemy.mesh.position.y += Math.sin(enemy.phase * 3.2) * dt * 1.1;
        if (enemy.type === 'dart') enemy.mesh.position.y += Math.sin(enemy.phase * 5.4) * dt * 0.7;
        if (enemy.type === 'splitter') enemy.mesh.position.y += Math.sin(enemy.phase * 2.0) * dt * 1.4;
        if (enemy.type === 'turret') {
          enemy.mesh.children[1].rotation.z += dt * 4;
          enemy.shoot -= dt;
          if (enemy.shoot <= 0) {
            enemy.shoot = rand(1.0, 1.8) / game.rift;
            shootEnemy(enemy.mesh.position.x - 0.45, enemy.mesh.position.y, aimAtPlayer(enemy.mesh.position, 4.8));
          }
        }
        enemy.mesh.rotation.x += dt * 1.6;
        enemy.mesh.rotation.y += dt * 2.3;
        if (enemy.mesh.position.x < WORLD.left - 2) removeAt(enemies, i);
      }
    }

    function updateEnemyBullets(dt) {
      for (let i = enemyBullets.length - 1; i >= 0; i -= 1) {
        const bullet = enemyBullets[i];
        bullet.mesh.position.x += bullet.vx * dt;
        bullet.mesh.position.y += bullet.vy * dt;
        bullet.life -= dt;
        bullet.mesh.rotation.z += dt * 5;
        if (bullet.life <= 0 || bullet.mesh.position.x < WORLD.left - 2 || Math.abs(bullet.mesh.position.y) > WORLD.top + 2) removeAt(enemyBullets, i);
      }
    }

    function updatePowerups(dt) {
      for (let i = powerups.length - 1; i >= 0; i -= 1) {
        const item = powerups[i];
        item.mesh.position.x -= item.vx * dt;
        item.mesh.position.y += Math.sin(game.time * 4 + item.phase) * dt * 0.55;
        item.mesh.rotation.x += dt * 2.4;
        item.mesh.rotation.y += dt * 3.2;
        item.life -= dt;
        if (item.life <= 0 || item.mesh.position.x < WORLD.left - 1.5) removeAt(powerups, i);
      }
    }

    function updateTerrain(dt) {
      for (let i = terrain.length - 1; i >= 0; i -= 1) {
        const item = terrain[i];
        item.mesh.position.x -= item.vx * dt;
        item.mesh.rotation.x += item.spin * dt;
        item.mesh.rotation.z += item.spin * 0.7 * dt;
        if (item.mesh.position.x < WORLD.left - 2) {
          scene.remove(item.mesh);
          terrain.splice(i, 1);
        }
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i -= 1) {
        const p = particles[i];
        p.mesh.position.x += p.vx * dt;
        p.mesh.position.y += p.vy * dt;
        p.mesh.position.z += p.vz * dt;
        p.mesh.scale.multiplyScalar(1 + dt * p.grow);
        p.life -= dt;
        p.mesh.material.opacity = Math.max(0, p.life / p.maxLife);
        if (p.life <= 0) removeAt(particles, i);
      }
    }

    function updateShockwaves(dt) {
      for (let i = shockwaves.length - 1; i >= 0; i -= 1) {
        const wave = shockwaves[i];
        wave.mesh.scale.addScalar(dt * wave.speed);
        wave.mesh.material.opacity = Math.max(0, wave.mesh.material.opacity - dt * 1.7);
        wave.life -= dt;
        if (wave.life <= 0) removeAt(shockwaves, i);
      }
    }

    function updateBoss(dt) {
      if (!boss) return;
      boss.phase += dt;
      if (boss.entry) {
        boss.mesh.position.x += ((WORLD.right - 2.0) - boss.mesh.position.x) * Math.min(1, dt * 0.8);
        if (boss.mesh.position.x < WORLD.right - 1.8) boss.entry = false;
      } else {
        boss.mesh.position.y = Math.sin(boss.phase * 0.8) * 2.8;
        boss.mesh.position.x = WORLD.right - 2.0 + Math.sin(boss.phase * 0.5) * 0.35;
        boss.shoot -= dt;
        if (boss.shoot <= 0) {
          boss.shoot = Math.max(0.32, 0.82 - game.time * 0.004);
          const count = 5 + Math.floor((1 - boss.hp / boss.maxHp) * 5);
          for (let i = 0; i < count; i += 1) {
            const angle = -Math.PI + (i / (count - 1)) * Math.PI * 0.84 - Math.PI * 0.08;
            shootEnemy(boss.mesh.position.x - 1.1, boss.mesh.position.y, { x: Math.cos(angle) * 4.2, y: Math.sin(angle) * 4.2 });
          }
          ping(155, 0.09, 'sawtooth', 0.035);
        }
      }
      boss.mesh.children[1].rotation.z += dt * 1.9;
      boss.mesh.children[2].rotation.x += dt * 1.3;
      boss.mesh.rotation.z = Math.sin(boss.phase) * 0.08;
    }

    function updateCollisions() {
      for (let i = bullets.length - 1; i >= 0; i -= 1) {
        const bullet = bullets[i];
        let hit = false;
        for (let j = enemies.length - 1; j >= 0; j -= 1) {
          const enemy = enemies[j];
          if (distance2(bullet.mesh.position, enemy.mesh.position) < (bullet.radius + enemy.radius) ** 2) {
            damageEnemy(enemy, j, bullet.damage);
            hit = true;
            break;
          }
        }
        if (!hit && boss && distance2(bullet.mesh.position, boss.mesh.position) < (bullet.radius + boss.radius) ** 2) {
          damageBoss(bullet.damage);
          hit = true;
        }
        if (hit) {
          spark(bullet.mesh.position, 5, 0xefffff, 0.35);
          removeAt(bullets, i);
        }
      }

      for (let i = enemyBullets.length - 1; i >= 0; i -= 1) {
        const bullet = enemyBullets[i];
        if (game.invulnerable <= 0 && distance2(bullet.mesh.position, player.position) < (bullet.radius + player.userData.radius) ** 2) {
          removeAt(enemyBullets, i);
          hitPlayer(14);
        }
      }

      for (let i = enemies.length - 1; i >= 0; i -= 1) {
        const enemy = enemies[i];
        if (game.invulnerable <= 0 && distance2(enemy.mesh.position, player.position) < (enemy.radius + player.userData.radius) ** 2) {
          damageEnemy(enemy, i, 99);
          hitPlayer(28);
        }
      }

      if (boss && game.invulnerable <= 0 && distance2(boss.mesh.position, player.position) < (boss.radius + player.userData.radius) ** 2) {
        hitPlayer(38);
      }

      for (let i = terrain.length - 1; i >= 0; i -= 1) {
        const item = terrain[i];
        if (game.invulnerable <= 0 && distance2(item.mesh.position, player.position) < (item.radius + player.userData.radius) ** 2) {
          hitPlayer(22);
          explode(item.mesh.position, 0x7db8ff, 10);
          scene.remove(item.mesh);
          terrain.splice(i, 1);
        }
      }

      for (let i = powerups.length - 1; i >= 0; i -= 1) {
        const item = powerups[i];
        if (distance2(item.mesh.position, player.position) < (item.radius + player.userData.radius + 0.24) ** 2) {
          collectPowerup(item);
          removeAt(powerups, i);
        }
      }
    }

    function damageEnemy(enemy, index, amount) {
      enemy.hp -= amount;
      enemy.mesh.scale.setScalar(1 + (1 - enemy.hp / enemy.maxHp) * 0.12);
      if (enemy.hp <= 0) {
        game.score += Math.round(enemy.value * game.combo);
        game.combo = Math.min(5, game.combo + 0.15);
        game.comboTimer = 2.4;
        explode(enemy.mesh.position, enemy.type === 'dart' ? 0xffd166 : 0xff4f8f, enemy.type === 'splitter' ? 22 : 14);
        if (enemy.type === 'splitter') {
          for (let i = 0; i < 3; i += 1) shootEnemy(enemy.mesh.position.x, enemy.mesh.position.y, { x: rand(-4.8, -3.4), y: rand(-2.2, 2.2) });
        }
        if (chance(0.18 + game.weapon * 0.025)) spawnPowerup(enemy.mesh.position);
        removeAt(enemies, index);
        shake = Math.max(shake, 0.16);
        ping(90 + Math.random() * 80, 0.08, 'triangle', 0.035);
      } else {
        shake = Math.max(shake, 0.05);
      }
    }

    function damageBoss(amount) {
      boss.hp -= amount;
      boss.mesh.scale.setScalar(1 + (1 - boss.hp / boss.maxHp) * 0.08);
      if (chance(0.12)) spark(boss.mesh.position, 8, 0x7db8ff, 0.65);
      if (boss.hp <= 0) {
        game.score += 10000;
        game.bossDefeated = true;
        explode(boss.mesh.position, 0x7db8ff, 80, 2.2);
        scene.remove(boss.mesh);
        boss = null;
        bossTimer = 42;
        game.weapon = Math.min(4, game.weapon + 1);
        game.shield = game.maxShield;
        noticeEl.textContent = 'Sentinel broken. The rift is still accelerating.';
        shake = 1.5;
        flash = 1;
        ping(70, 0.6, 'sawtooth', 0.07);
      }
    }

    function hitPlayer(amount) {
      game.shield -= amount;
      game.invulnerable = 0.75;
      shake = Math.max(shake, 0.55);
      flash = 0.7;
      spark(player.position, 20, 0x3ff3df, 0.9);
      ping(80, 0.16, 'sawtooth', 0.05);
      if (game.shield <= 0) {
        game.lives -= 1;
        explode(player.position, 0x3ff3df, 34, 1.1);
        game.shield = game.maxShield;
        game.invulnerable = 2.2;
        game.weapon = Math.max(1, game.weapon - 1);
        player.position.set(WORLD.left + 2.3, 0, 0);
        if (game.lives <= 0) endGame();
      }
    }

    function endGame() {
      state = 'gameover';
      highScore = Math.max(highScore, game.score);
      localStorage.setItem('starwakeHighScore', String(highScore));
      menuEl.classList.remove('hidden');
      menuEl.querySelector('.kicker').textContent = 'Run ended';
      menuEl.querySelector('h1').textContent = 'Starwake Rift';
      menuEl.querySelector('.copy').textContent = `Score ${Math.floor(game.score).toLocaleString()} · Best ${Math.floor(highScore).toLocaleString()} · Rift ${game.rift.toFixed(1)}x`;
      startBtn.textContent = 'Restart Run';
      noticeEl.textContent = 'Press Enter or Start Run to try again.';
      ping(55, 0.42, 'triangle', 0.06);
    }

    function spawnPowerup(position) {
      const mesh = new THREE.Mesh(new THREE.OctahedronGeometry(0.25, 1), materials.power);
      mesh.position.copy(position);
      scene.add(mesh);
      powerups.push({ mesh, vx: 2.2, radius: 0.34, life: 9, phase: rand(0, 6.28) });
    }

    function collectPowerup(item) {
      game.score += 350;
      game.shield = Math.min(game.maxShield, game.shield + 28);
      if (chance(game.weapon < 4 ? 0.7 : 0.2)) game.weapon = Math.min(4, game.weapon + 1);
      spark(item.mesh.position, 24, 0x75ff88, 0.9);
      makeShockwave(item.mesh.position, 0x75ff88);
      ping(760, 0.13, 'sine', 0.05);
    }

    function shootEnemy(x, y, velocity) {
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 8), materials.enemyBullet);
      mesh.position.set(x, y, 0);
      scene.add(mesh);
      enemyBullets.push({ mesh, vx: velocity.x, vy: velocity.y, life: 4, radius: 0.18 });
    }

    function aimAtPlayer(from, speed) {
      const dx = player.position.x - from.x;
      const dy = player.position.y - from.y;
      const length = Math.max(0.001, Math.hypot(dx, dy));
      return { x: (dx / length) * speed, y: (dy / length) * speed };
    }

    function explode(position, color, count, scale = 1) {
      spark(position, count, color, scale);
      makeShockwave(position, color);
    }

    function spark(position, count, color, scale = 1) {
      const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1, depthWrite: false });
      const geo = new THREE.TetrahedronGeometry(0.06 * scale, 0);
      for (let i = 0; i < count; i += 1) {
        const mesh = new THREE.Mesh(geo, mat.clone());
        mesh.position.copy(position);
        mesh.position.z += rand(-0.2, 0.2);
        const speed = rand(1.2, 6.5) * scale;
        const angle = rand(0, Math.PI * 2);
        scene.add(mesh);
        particles.push({
          mesh,
          vx: Math.cos(angle) * speed - 1.5,
          vy: Math.sin(angle) * speed,
          vz: rand(-1.5, 1.5),
          life: rand(0.25, 0.72),
          maxLife: 0.72,
          grow: rand(0.5, 1.5)
        });
      }
    }

    function makeShockwave(position, color) {
      const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.75, side: THREE.DoubleSide, depthWrite: false });
      const mesh = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.018, 8, 48), mat);
      mesh.position.copy(position);
      mesh.rotation.x = Math.PI / 2;
      scene.add(mesh);
      shockwaves.push({ mesh, life: 0.5, speed: 4.2 });
    }

    function removeAt(list, index) {
      scene.remove(list[index].mesh);
      list.splice(index, 1);
    }

    function distance2(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      return dx * dx + dy * dy;
    }

    function updateBackground(dt) {
      const drift = state === 'playing' && !game.paused ? game.rift : 0.7;
      for (const layer of starLayers) {
        const pos = layer.geometry.attributes.position;
        for (let i = 0; i < pos.count; i += 1) {
          let x = pos.getX(i) - layer.userData.speed * drift * dt;
          if (x < WORLD.left - 5) x = WORLD.right + rand(4, 28);
          pos.setX(i, x);
        }
        pos.needsUpdate = true;
      }
      tunnel.children.forEach((ring) => {
        ring.position.x -= ring.userData.speed * drift * dt;
        ring.rotation.z += dt * 0.08;
        if (ring.position.x < WORLD.left - 8) {
          ring.position.x = WORLD.right + rand(8, 24);
          ring.scale.setScalar(rand(0.7, 1.25));
        }
      });
    }

    function render(dt) {
      shake = Math.max(0, shake - dt * 1.6);
      flash = Math.max(0, flash - dt * 2.8);
      const sx = (Math.random() - 0.5) * shake * 0.35;
      const sy = (Math.random() - 0.5) * shake * 0.26;
      camera.position.set(sx, sy, 18);
      camera.lookAt(sx * 0.15, sy * 0.15, 0);
      flashEl.style.opacity = String(Math.min(0.5, flash));
      renderer.render(scene, camera);
    }

    function updateHud() {
      scoreEl.textContent = Math.floor(game.score).toLocaleString();
      livesEl.textContent = String(game.lives);
      const shieldPct = clamp(game.shield / game.maxShield, 0, 1);
      shieldTextEl.textContent = `${Math.round(shieldPct * 100)}%`;
      shieldBarEl.style.width = `${shieldPct * 100}%`;
      weaponEl.textContent = ['Pulse I', 'Twin II', 'Split III', 'Lance IV'][game.weapon - 1] || 'Lance IV';
      riftEl.textContent = `${game.rift.toFixed(1)}x`;
    }

    function ensureAudio() {
      if (audio) return;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      audio = new Ctx();
    }

    function ping(freq, duration, type, volume) {
      if (game.muted || !audio) return;
      if (audio.state === 'suspended') audio.resume();
      const osc = audio.createOscillator();
      const gain = audio.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audio.currentTime);
      osc.frequency.exponentialRampToValueAtTime(Math.max(20, freq * 0.45), audio.currentTime + duration);
      gain.gain.setValueAtTime(volume, audio.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + duration);
      osc.connect(gain);
      gain.connect(audio.destination);
      osc.start();
      osc.stop(audio.currentTime + duration);
    }
  </script>
